<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#00CEC9"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <circle cx="256" cy="256" r="256" fill="#0F0F1A"/>
  <!-- Main gradient circle -->
  <circle cx="256" cy="256" r="192" fill="url(#g)"/>
  <!-- Sync ring arc 1: top → bottom-right (~160°, clockwise) -->
  <path d="M 256,46 A 210,210 0 0,1 343,466"
        stroke="white" stroke-width="20" fill="none"
        stroke-linecap="round" opacity="0.85"/>
  <!-- Arrowhead for arc 1 (at ~70° on circle) -->
  <polygon points="343,466 364,447 358,472" fill="white" opacity="0.85"/>
  <!-- Sync ring arc 2: bottom → top-left (~160°, clockwise) -->
  <path d="M 256,466 A 210,210 0 0,1 169,46"
        stroke="white" stroke-width="20" fill="none"
        stroke-linecap="round" opacity="0.85"/>
  <!-- Arrowhead for arc 2 (at ~250° on circle) -->
  <polygon points="169,46 148,65 154,40" fill="white" opacity="0.85"/>
  <!-- Lock body -->
  <rect x="192" y="272" width="128" height="96" rx="14" fill="white"/>
  <!-- Lock shackle -->
  <path d="M222,272 V228 a34,34 0 0,1 68,0 V272"
        fill="none" stroke="white" stroke-width="22" stroke-linecap="round"/>
  <!-- Keyhole dot -->
  <circle cx="256" cy="308" r="13" fill="#6C5CE7"/>
  <!-- Keyhole slot -->
  <rect x="249" y="308" width="14" height="24" rx="4" fill="#6C5CE7"/>
</svg>
