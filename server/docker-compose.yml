version: "3.8"

# LockSync relay server — standalone deployment (no Coolify).
# For Coolify: use the root docker-compose.yaml instead.
#
# Standalone usage:
#   cp .env.example .env
#   # edit .env and set JWT_SECRET
#   docker compose up -d

services:
  locksync-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locksync-server
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3000}:8080"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    volumes:
      - locksync_data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  locksync_data:
