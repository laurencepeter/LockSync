version: "3.8"

# LockSync relay server — deploy via Coolify or standalone.
# Coolify: point to this file and set env vars in the Coolify dashboard.
# Standalone: cp .env.example .env && edit .env && docker compose up -d

services:
  locksync-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locksync-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - PORT=${PORT:-8080}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
