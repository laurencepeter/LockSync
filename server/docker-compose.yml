version: "3.8"

# LockSync relay server — deploy via Coolify or standalone Docker.
#
# ── Coolify deployment ──────────────────────────────────────────────
# 1. In Coolify, create a new service → "Docker Compose" → point to this repo.
# 2. Set the Port to 8080 in the Coolify service settings (Coolify/Traefik
#    will handle TLS + WSS termination automatically).
# 3. Add the env vars below in the Coolify "Environment Variables" panel.
# 4. Enable "Expose Port" OFF — Coolify's Traefik proxy reaches the container
#    via Docker's internal network; the host never sees port 8080 directly.
#
# ── Standalone deployment (no Coolify) ─────────────────────────────
# cp .env.example .env && edit .env && docker compose up -d
# Then put server/nginx-locksync.conf in your Nginx config.

services:
  locksync-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: locksync-server
    restart: unless-stopped
    # Do NOT bind to host ports when running behind Coolify/Traefik.
    # Coolify connects to the container directly on the internal Docker network.
    # For standalone use, uncomment the lines below:
    # ports:
    #   - "127.0.0.1:8080:8080"   # bind to localhost only; Nginx proxies externally
    expose:
      - "8080"
    volumes:
      # Persist pairs.json across container restarts — pairs are permanent
      - locksync_data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  locksync_data:
    # Named volume — Docker manages the path; persists across `docker compose down`
    # In Coolify, this maps to a managed persistent volume automatically.
