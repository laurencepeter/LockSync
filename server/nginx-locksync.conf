# Nginx reverse proxy for LockSync WebSocket server
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled/
# Or use as a Coolify custom Nginx config.
#
# Replace locksync.yourdomain.com with your actual domain.
# TLS certs: Let's Encrypt via Coolify (automatic) or certbot.

upstream locksync_ws {
    server 127.0.0.1:8080;
    # If running via Docker Compose, use the service name:
    # server locksync-server:8080;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name locksync.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name locksync.yourdomain.com;

    # ─── TLS (Let's Encrypt via Coolify or certbot) ─────────────
    ssl_certificate     /etc/letsencrypt/live/locksync.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/locksync.yourdomain.com/privkey.pem;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ─── Health check (plain HTTP through Nginx) ────────────────
    location /health {
        proxy_pass http://locksync_ws/health;
        proxy_http_version 1.1;
    }

    # ─── WebSocket proxy ────────────────────────────────────────
    location / {
        proxy_pass http://locksync_ws;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client IP
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;

        # Timeouts — keep WS connections alive
        proxy_read_timeout 86400s;   # 24 hours
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Buffering off for real-time
        proxy_buffering off;

        # Rate limiting on connection establishment
        limit_req zone=ws_connect burst=20 nodelay;
    }
}

# Rate limit zone (place in http {} block of nginx.conf)
# limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/s;
