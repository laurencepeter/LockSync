# LockSync Nginx reverse proxy — for STANDALONE (non-Coolify) deployments only.
# Coolify uses Traefik and handles TLS/WSS automatically — skip this file.
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/locksync
#   2. ln -s /etc/nginx/sites-available/locksync /etc/nginx/sites-enabled/
#   3. Add the rate limit zone to /etc/nginx/nginx.conf inside the http {} block:
#        limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/s;
#   4. Replace locksync.yourdomain.com with your actual domain
#   5. Obtain TLS certs: certbot --nginx -d locksync.yourdomain.com
#   6. nginx -t && systemctl reload nginx

upstream locksync_ws {
    server 127.0.0.1:8080;
    # If using Docker Compose standalone mode, use service name instead:
    # server locksync-server:8080;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name locksync.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name locksync.yourdomain.com;

    # ─── TLS (Let's Encrypt via certbot) ────────────────────────
    ssl_certificate     /etc/letsencrypt/live/locksync.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/locksync.yourdomain.com/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ─── Health check ────────────────────────────────────────────
    location /health {
        proxy_pass http://locksync_ws/health;
        proxy_http_version 1.1;
    }

    # ─── WebSocket proxy ─────────────────────────────────────────
    location / {
        proxy_pass http://locksync_ws;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward real client IP (used by server for rate limiting)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header Origin $http_origin;

        # Keep WebSocket connections alive (24h max)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;

        # Real-time — no buffering
        proxy_buffering off;

        # Connection-level rate limiting (ws_connect zone defined in nginx.conf http block)
        limit_req zone=ws_connect burst=20 nodelay;
    }
}
