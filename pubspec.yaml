name: locksync
description: >
  LockSync — Coordinated synchronized lockscreen app.
  When one person edits their lockscreen, the other person's updates in real time.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.1
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  uuid: ^4.5.1
  qr_flutter: ^4.1.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.3
  flutter_background_service: ^5.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
