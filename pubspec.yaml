name: locksync
description: Cross-platform Flutter app for synchronized shared home screen between connected devices.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Storage (JSON-based, no code gen required)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Navigation
  go_router: ^13.2.0

  # QR Code generation and scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.6

  # Networking
  web_socket_channel: ^2.4.0
  network_info_plus: ^5.0.3

  # Utilities
  uuid: ^4.3.3
  equatable: ^2.0.5

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
