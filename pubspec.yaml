name: npups
description: >
  National Programme for the Upkeep of Public Spaces (NPUPS) Digital System.
  Worker Registration & Payroll — Ministry of Rural Development & Local Government,
  Republic of Trinidad and Tobago.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  google_fonts: ^6.1.0
  excel: ^4.0.6
  file_saver: ^0.2.14
  path_provider: ^2.1.4
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
